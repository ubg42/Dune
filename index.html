<!DOCTYPE html>
<html lang="en-us">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Curve Rush</title>

  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      background: #000;
      overflow: hidden;
    }
    #unity-container, #unity-canvas {
      width: 100%;
      height: 100%;
      display: block;
      background: #000;
    }
  </style>
</head>

<body>
  <div id="unity-container" style="display:none;">
    <canvas id="unity-canvas"></canvas>
  </div>

  <div id="loadingBlock" style="color:white;position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-family:sans-serif;">
    Loading...
  </div>

  <script>
    const buildUrl = "https://ubg42.github.io/Dune/25030705/Build/";
    const loaderUrl = buildUrl + "curve-rush-v25030705.loader.js";

    const config = {
      dataUrl: buildUrl + "curve-rush-v25030705.data.unityweb",
      frameworkUrl: buildUrl + "curve-rush-v25030705.framework.js.unityweb",
      codeUrl: buildUrl + "curve-rush-v25030705.wasm.unityweb",
      streamingAssetsUrl: "https://ubg42.github.io/Dune/25030705/StreamingAssets",
      companyName: "1games.io",
      productName: "Curve Rush",
      productVersion: "25030705",
      devicePixelRatio: 1
    };

    const canvas = document.getElementById("unity-canvas");
    const container = document.getElementById("unity-container");
    const loading = document.getElementById("loadingBlock");

    const script = document.createElement("script");
    script.src = loaderUrl;

    script.onload = () => {
      if (typeof createUnityInstance !== "function") {
        loading.innerText = "Unity loader failed.";
        return;
      }

      createUnityInstance(canvas, config, (progress) => {
        loading.innerText = "Loading " + Math.round(progress * 100) + "%";
      }).then(() => {
        loading.style.display = "none";
        container.style.display = "block";
      }).catch(err => {
        loading.innerText = "Unity error: " + err;
      });
    };

    script.onerror = () => {
      loading.innerText = "Loader file missing.";
    };

    document.body.appendChild(script);
  </script>
</body>
</html>
