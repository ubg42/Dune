<!DOCTYPE html>
<html lang="en-us">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <link rel="stylesheet" href="25030705/theme/game.css">
  <link rel="canonical" href="https://ubg42.github.io/Dune/">
  <title>Curve Rush</title>
  <meta name="description" content="Curve Rush: Speed down and launch into the sky! Master the slopes, land smoothly, and go for insane air tricks in this addicting sand-riding game.">

  <style type="text/css">
    .jss1:before {
      top: 0;
      width: 100%;
      filter: blur(16px);
      height: 100%;
      content: "";
      display: block;
      opacity: .5;
      z-index: 0;
      position: absolute;
      background-size: cover;
      background-image: url("25030705/loading.png");
    }
  </style> 

  <script>
    // --- Paths ---
    var baseUrl = "./";
    var versionFolder = "25030705/";
    var buildUrl = baseUrl + versionFolder + "Build";

    var loaderUrl = buildUrl + "/curve-rush-v25030705.loader.js";

    var config = {
      dataUrl: buildUrl + "/curve-rush-v25030705.data.unityweb",
      frameworkUrl: buildUrl + "/curve-rush-v25030705.framework.js.unityweb",
      codeUrl: buildUrl + "/curve-rush-v25030705.wasm.unityweb",
      streamingAssetsUrl: baseUrl + versionFolder + "StreamingAssets",
      companyName: "1games.io",
      productName: "Curve Rush",
      productVersion: "25030705",
      pubId: ""
    };

    // Optional config
    config.hostindex = 2;
    config.gameId = "curve-rush";
    config.eventLog = true;
    config.buildAPI = "https://event.azgame.io/apiaz/event";
    let currentDate = new Date();
    let endLogDate = new Date("2025-04-14T08:58:22.933Z");
    if (currentDate > endLogDate) config.eventLog = false;
    config.enableMoreGame = "yes";
    config.enablePromotion = true;
  </script>
</head>

<body>
  <!-- Unity container -->
  <div id="unity-container" style="display: none;">
    <canvas id="unity-canvas"></canvas> 
  </div>

  <!-- Loading screen -->
  <div id="loadingBlock">
    <div class="jss31 jss34 jss1">
      <div style="position: absolute; font-family: Arial, Helvetica, sans-serif; bottom: 10px; right: 10px; font-size: 18px; color: #ffffff; opacity: 0.5;">25030705</div>
      <div class="spinner"></div>
      <div class="jss31 jss34 jss48" style="flex: 1 1 0%;">
        <div class="jss32">
          <div class="jss7 jss9 jss20 jss3">
            <div class="jss125">
              <div class="jss123">
                <img src="25030705/logo.png">
              </div>
            </div>
          </div>
        </div>
      </div>
      <div class="jss31 jss34" style="flex: 3 1 0%;">
        <div class="jss32">
          <div class="jss31 jss34 jss39 jss50 gameloader">
            <div class="jss32">
              <div class="gameloader-game-name">Curve Rush</div>
            </div>
            <div class="jss32">
              <div class="jss32 gameloader-logo">
                <img id="game-logo" src="25030705/loading.png">
              </div>
            </div>
            <div class="jss32">
              <div>
                <div class="gameloader-progressbar">
                  <div class="gameloader-progressbar-progress" id="progress_fill" style="width: 0%;"></div>
                </div>
                <div class="gameloader-progress-info">Game Loading...</div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Load Unity game -->
  <script>
    var progressElement = document.getElementById('progress_fill');
    var container = document.getElementById("unity-container");
    var canvas = document.getElementById("unity-canvas");
    var loadingBar = document.getElementById("loadingBlock");
    var progress_text = document.querySelector(".gameloader-progress-info");

    var script = document.createElement("script");
    script.src = loaderUrl;
    script.onload = () => {
      createUnityInstance(canvas, config, (progress) => {
        progressElement.style.width = 100 * progress + "%";
        progress_text.innerText = "Downloading file: " + Math.round(progress * 100) + "%";
        if (progress >= 99) progress_text.innerText = "Game Loading ...";
      }).then((unityInstance) => {
        window.unityInstance = unityInstance;
        setTimeout(() => {
          loadingBar.style.display = "none";
          window.focus();
        }, 2000);
        container.style.display = "block";
      }).catch((message) => { alert(message); });
    };
    document.body.appendChild(script);
  </script>

  <!-- Firebase Analytics -->
  <script src="https://www.gstatic.com/firebasejs/10.9.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.9.0/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.9.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.9.0/firebase-analytics-compat.js"></script>
  <script type="module">
    const firebaseConfig = {
      apiKey: "AIzaSyC2Q-lcEJc72-X-g6okDIPPYSwS2kS5ARE",
      authDomain: "curve-rush-1games.firebaseapp.com",
      projectId: "curve-rush-1games",
      storageBucket: "curve-rush-1games.firebasestorage.app",
      messagingSenderId: "565813985587",
      appId: "1:565813985587:web:233ae9bbe95c8489527e46",
      measurementId: "G-7HV2QGKCTR"
    };

    if(firebaseConfig) {
      window.dataLayer = window.dataLayer || [];
      window.gtag = function () { window.dataLayer.push(arguments); }
      window.gtag("config", firebaseConfig.measurementId, {
        cookie_domain: window.location.hostname,
        cookie_flags: "SameSite=None;Secure",
      });
      const app = firebase.initializeApp(firebaseConfig);
    }
  </script>

  <script>
    function firebaseSetUserProperties(props) { firebase.analytics().setUserProperties(props); }
    function firebaseLogEvent(event_name) { firebase.analytics().logEvent(event_name); }
    function firebaseLogEventParameter(event_name, event_param) { firebase.analytics().logEvent(event_name, event_param); }

    let time_counter_gm = 0;
    function gmRepeatEvery30Seconds() {
      setInterval(() => {
        if(config.eventLog) firebaseLogEvent("time_countergm_" + time_counter_gm++);
      }, 30000);
    }
    gmRepeatEvery30Seconds();
  </script>
</body>
</html>
